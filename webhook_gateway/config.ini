[DATABASE]
DB_HOST=localhost
DB_PORT=3306
DB_NAME=foodcourt
DB_USER=root
DB_PASSWORD=123456

; บันทึก webhook ลงไฟล์ที่ data/{YYYY-MM-DD}/{source}/*.json (ใช้ร่วมกับ DB)
[WEBHOOK]
; เปิด = บันทึกลงโฟลเดอร์ data/{YYYY-MM-DD} ด้วย (true/false)
SAVE_TO_FILES=true
; โฟลเดอร์ฐานสำหรับบันทึกไฟล์ (จะได้ path เป็น data/2026-02-03/paysuccess/ ฯลฯ)
DATA_DIR=data
; รหัสลับสำหรับตรวจสอบลายเซ็นจากธนาคาร (ถ้าธนาคารส่ง X-Signature หรือ X-Webhook-Signature = HMAC-SHA256(body, secret) ใส่ค่าที่ตรงกับที่ลงทะเบียนกับธนาคาร; ว่าง = ไม่ตรวจ)
WEBHOOK_SECRET=
