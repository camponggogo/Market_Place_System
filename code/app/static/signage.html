<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จอที่ 2 - QR Payment & Digital Signage</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, 'Sarabun', sans-serif;
            background: #fff;
            color: #333;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* หัวข้อ: สื่อโฆษณาของร้าน + {ชื่อร้าน} */
        .signage-header {
            flex-shrink: 0;
            padding: 12px 24px;
            background: #f5f5f5;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid #ddd;
            color: #333;
        }

        /* Layout 50/50 */
        .signage-split {
            flex: 1;
            display: flex;
            width: 100%;
            min-height: 0;
            overflow: hidden;
        }

        /* ซ้าย 50%: Image signage – ความสูงเต็ม 100%, crop ด้านกว้าง, เปลี่ยนรูปทุก 2 วินาที */
        .signage-video-section {
            flex: 0 0 75%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 0;
            min-width: 0;
            overflow: hidden;
        }
        .signage-video-section .signage-media-img {
            width: 100%;
            height: 100%;
            min-height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .signage-video-section video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ขวา 50%: ช่องรอชำระ PromptPay (QR ด้านบน + รายการสินค้าด้านล่าง) – โทนเข้ม */
        .signage-right-section {
            flex: 0 0 25%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #1a1d24;
            min-width: 0;
            color: #fff;
        }

        /* กล่องเดียว: ด้านบน = QR หรือข้อความรอ, ด้านล่าง = รายการสินค้า */
        .payment-channel {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            min-height: 0;
        }

        .payment-channel-top {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 12px;
        }

        .signage-right-section .qr-wrap {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .signage-right-section .qr-wrap img.qr-banner {
            display: block;
            width: 100%;
            min-width: 220px;
            max-width: 360px;
            height: auto;
            margin-bottom: 12px;
            object-fit: contain;
        }
        .signage-right-section .qr-wrap img#signage-qr {
            display: block;
            width: 100%;
            height: auto;
            min-width: 220px;
            min-height: 220px;
            max-width: 360px;
            object-fit: contain;
            background: #fff;
        }
        #signage-qr-plain-wrap img,
        #signage-qr-plain-wrap table { display: block !important; max-width: 100%; height: auto; margin: 0 auto; }
        #signage-qr-plain-wrap { min-width: 220px; min-height: 220px; max-width: 360px; margin: 0 auto; }
        .signage-right-section .payment-channel .amount {
            font-size: clamp(1.6rem, 4vw, 2.5rem);
            font-weight: 700;
            color: #28a745;
            margin-bottom: 0;
        }
        .payment-channel-top .price-label {
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            color: rgba(255,255,255,0.85);
            margin-bottom: 4px;
        }
        .signage-right-section .idle-msg {
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            opacity: 0.9;
            text-align: center;
        }
        #idle-block .amount { font-size: clamp(1.5rem, 3.5vw, 2.2rem); font-weight: 700; color: #28a745; }
        .qr-hint { font-size: clamp(0.75rem, 1.5vw, 0.9rem); color: rgba(255,255,255,0.6); margin-top: 8px; text-align: center; }

        /* รายการสินค้า – ความสูง 60% ของหน้าจอเสมอ */
        .payment-channel-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            height: 60vh;
            max-height: 60vh;
        }
        .payment-channel-list .list-title {
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            font-weight: 700;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.95);
        }
        .signage-right-section .product-list {
            text-align: left;
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
        }
        .signage-right-section .product-list .product-item {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .signage-right-section .product-list .product-item:last-child { border-bottom: none; }
        .payment-channel-list .list-total {
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            font-weight: 700;
            color: #28a745;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .payment-channel-list .list-empty {
            font-size: clamp(0.9rem, 1.8vw, 1.05rem);
            color: rgba(255,255,255,0.6);
            padding: 12px;
        }

        /* Paid mode - full overlay */
        .paid-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }
        .paid-overlay.active { display: flex; }
        .paid-overlay .message {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            color: #28a745;
            margin-bottom: 16px;
        }
        .paid-overlay .amount {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: #333;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="signage-header" id="signage-header">สื่อโฆษณาของร้าน</div>

    <div class="signage-split">
        <!-- ซ้าย 50%: Image signage (ความสูง 100%, crop ความกว้าง, เปลี่ยนทุก 2 วินาที) -->
        <div class="signage-video-section">
            <img id="signage-media-img" class="signage-media-img" src="" alt="" style="display:none;">
            <video id="signage-video" muted playsinline loop autoplay style="display:none;"></video>
        </div>

        <!-- ขวา 50%: ช่องรอชำระ PromptPay – QR ด้านบน, รายการสินค้าด้านล่าง (ช่องเดียวกัน) -->
        <div class="signage-right-section">
            <div class="payment-channel">
                <div class="payment-channel-top">
                    <div id="qr-block" style="display:none;">
                        <div class="qr-wrap">
                            <img src="/static/imgs/ci-qrpayment-img-01.png" alt="Thai QR Payment" class="qr-banner">
                            <div id="signage-qr-plain-wrap" style="display:none; min-height:220px;"></div>
                            <img id="signage-qr" src="" alt="QR Code">
                        </div>
                        <p class="price-label">ราคาอาหาร</p>
                        <div class="amount" id="signage-amount">0.00 บาท</div>
                    </div>
                    <div id="idle-block">
                        <p class="price-label">ราคาอาหาร</p>
                        <p class="idle-msg" id="idle-msg-text">รอยืนยันการชำระเงิน</p>
                        <div class="amount" id="idle-amount" style="display:none;">0.00 บาท</div>
                    </div>
                </div>
                <div class="payment-channel-list">
                    <div class="list-title" id="product-list-title">รายการอาหาร</div>
                    <div class="product-list" id="product-list"></div>
                    <div class="list-total" id="product-list-total" style="display:none;"></div>
                    <div class="list-empty" id="product-list-empty">ยังไม่มีรายการ – เลือกที่หน้าจอ 1 แล้วรายการจะแสดงแบบ Real time</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Paid overlay -->
    <div class="paid-overlay" id="paid-overlay">
        <div class="message">ได้รับเงินเรียบร้อยแล้ว</div>
        <div class="amount" id="paid-amount">0.00 บาท</div>
    </div>

    <script src="/static/js/qrcode.min.js"></script>
    <script>
        const API_BASE = window.location.origin + '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const storeId = urlParams.get('store_id') || 1;
        let pollInterval = null;
        let paidShownAt = null;
        const PAID_DISPLAY_MS = 5000;
        const SIGNAGE_IMAGE_INTERVAL_MS = 2000;
        let signageImageUrls = [];
        let signageImageIndex = 0;
        let signageImageTimer = null;
        let storeName = '';

        function updateHeader() {
            const h = document.getElementById('signage-header');
            h.textContent = 'สื่อโฆษณาของร้าน' + (storeName ? ' + ' + storeName : '');
        }

        function showQRMode(qrImage, amount, orderItems, qrPlainText) {
            document.getElementById('qr-block').style.display = 'block';
            document.getElementById('idle-block').style.display = 'none';
            var qrEl = document.getElementById('signage-qr');
            var plainWrap = document.getElementById('signage-qr-plain-wrap');
            var hasPlain = qrPlainText && typeof qrPlainText === 'string' && qrPlainText.trim().length > 0;
            if (hasPlain && typeof QRCode !== 'undefined' && plainWrap) {
                plainWrap.innerHTML = '';
                plainWrap.style.display = 'block';
                qrEl.style.display = 'none';
                qrEl.src = '';
                try {
                    new QRCode(plainWrap, {
                        text: qrPlainText.trim(),
                        width: 256,
                        height: 256,
                        colorDark: '#000',
                        colorLight: '#fff'
                    });
                } catch (e) {
                    console.warn('Signage QRCode draw failed', e);
                    plainWrap.style.display = 'none';
                    qrEl.style.display = 'block';
                    if (qrImage && (qrImage.startsWith('data:') || qrImage.startsWith('http'))) {
                        qrEl.src = qrImage;
                        qrEl.style.visibility = 'visible';
                    } else {
                        qrEl.src = '';
                        qrEl.style.visibility = 'hidden';
                    }
                }
            } else {
                plainWrap.style.display = 'none';
                plainWrap.innerHTML = '';
                qrEl.style.display = 'block';
                if (qrImage && (qrImage.startsWith('data:') || qrImage.startsWith('http'))) {
                    qrEl.src = qrImage;
                    qrEl.style.visibility = 'visible';
                } else {
                    qrEl.src = '';
                    qrEl.style.visibility = qrImage ? 'visible' : 'hidden';
                }
            }
            document.getElementById('signage-amount').textContent = parseFloat(amount || 0).toFixed(2) + ' บาท';
            renderProductList(orderItems || [], amount);
        }

        function showCartOnlyMode(orderItems, amount) {
            document.getElementById('qr-block').style.display = 'none';
            var idleBlock = document.getElementById('idle-block');
            idleBlock.style.display = 'block';
            idleBlock.innerHTML = '<p class="price-label">ราคาอาหาร</p><p class="idle-msg" id="idle-msg-text">รอยืนยันการชำระเงิน</p><div class="amount" id="idle-amount">' + parseFloat(amount || 0).toFixed(2) + ' บาท</div><p class="qr-hint">QR-Code แสดงเมื่อกด PromptPay หรือ ออก Order + QR ที่หน้าจอ 1</p>';
            document.getElementById('idle-amount').style.display = 'block';
            renderProductList(orderItems || [], amount);
        }

        function showIdleMode() {
            document.getElementById('qr-block').style.display = 'none';
            var idleBlock = document.getElementById('idle-block');
            idleBlock.style.display = 'block';
            idleBlock.innerHTML = '<p class="price-label">ราคาอาหาร</p><p class="idle-msg" id="idle-msg-text">รอยืนยันการชำระเงิน</p><div class="amount" id="idle-amount" style="display:none;">0.00 บาท</div>';
            renderProductList([], 0);
        }

        function renderProductList(items, totalAmount) {
            var el = document.getElementById('product-list');
            var titleEl = document.getElementById('product-list-title');
            var totalEl = document.getElementById('product-list-total');
            var emptyEl = document.getElementById('product-list-empty');
            if (!items || items.length === 0) {
                el.innerHTML = '';
                if (titleEl) titleEl.style.display = 'block';
                if (totalEl) totalEl.style.display = 'none';
                if (emptyEl) emptyEl.style.display = 'block';
                return;
            }
            if (emptyEl) emptyEl.style.display = 'none';
            el.innerHTML = items.map(function(it) {
                var name = it.name || '-';
                var qty = it.qty || 1;
                var total = (it.line_total != null ? it.line_total : (it.unit_price || 0) * qty);
                return '<div class="product-item">' + name + ' x' + qty + ' = ' + total.toFixed(2) + ' บาท</div>';
            }).join('');
            var sum = typeof totalAmount === 'number' && totalAmount > 0 ? totalAmount : items.reduce(function(acc, it) {
                return acc + (it.line_total != null ? it.line_total : (it.unit_price || 0) * (it.qty || 1));
            }, 0);
            if (totalEl) {
                totalEl.textContent = 'รวม ' + sum.toFixed(2) + ' บาท';
                totalEl.style.display = 'block';
            }
        }

        function showPaidMode(amount) {
            document.getElementById('paid-overlay').classList.add('active');
            document.getElementById('paid-amount').textContent = parseFloat(amount || 0).toFixed(2) + ' บาท';
        }

        function hidePaidMode() {
            document.getElementById('paid-overlay').classList.remove('active');
        }

        function speakPaymentReceived(amount) {
            if (!('speechSynthesis' in window)) return;
            const text = 'เงินเข้าแล้ว ' + (typeof amount === 'number' ? amount.toFixed(0) : amount) + ' บาท ขอบคุณครับ';
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'th-TH';
            u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function resolveMediaUrl(url) {
            if (!url) return '';
            return url.startsWith('http') ? url : (window.location.origin + url);
        }

        function showNextSignageImage() {
            const imgEl = document.getElementById('signage-media-img');
            const videoEl = document.getElementById('signage-video');
            if (signageImageUrls.length > 0) {
                imgEl.src = signageImageUrls[signageImageIndex];
                imgEl.style.display = 'block';
                imgEl.alt = 'สื่อโฆษณา';
                videoEl.style.display = 'none';
                videoEl.pause();
                signageImageIndex = (signageImageIndex + 1) % signageImageUrls.length;
            } else {
                imgEl.style.display = 'none';
                imgEl.src = '';
            }
        }

        function startSignageImageRotation() {
            if (signageImageTimer) clearInterval(signageImageTimer);
            if (signageImageUrls.length === 0) return;
            signageImageIndex = 0;
            showNextSignageImage();
            signageImageTimer = setInterval(showNextSignageImage, SIGNAGE_IMAGE_INTERVAL_MS);
        }

        async function loadSignageMedia() {
            try {
                const res = await fetch(API_BASE + '/signage/media');
                const data = await res.json();
                const items = data.items || [];
                const imageItems = items.filter(function(it) { return it.type === 'image'; });
                signageImageUrls = imageItems.map(function(it) { return resolveMediaUrl(it.url); }).filter(Boolean);
                var videoItem = items.find(function(it) { return it.type === 'video'; });
                var videoEl = document.getElementById('signage-video');
                var imgEl = document.getElementById('signage-media-img');
                if (signageImageUrls.length > 0) {
                    imgEl.style.display = 'block';
                    videoEl.style.display = 'none';
                    videoEl.pause();
                    startSignageImageRotation();
                } else if (videoItem && videoItem.url) {
                    imgEl.style.display = 'none';
                    imgEl.src = '';
                    videoEl.style.display = 'block';
                    videoEl.src = resolveMediaUrl(videoItem.url);
                    videoEl.muted = true;
                    videoEl.playsInline = true;
                    videoEl.loop = true;
                    videoEl.play().catch(function() {});
                }
            } catch (e) { console.warn('Signage media load', e); }
        }

        async function poll() {
            try {
                const res = await fetch(API_BASE + '/signage/display?store_id=' + storeId);
                const data = await res.json();

                if (data.store_name) storeName = data.store_name;
                updateHeader();

                if (data.status === 'paid') {
                    showPaidMode(data.amount);
                    if (!paidShownAt) {
                        paidShownAt = Date.now();
                        speakPaymentReceived(data.amount);
                    }
                    if (Date.now() - paidShownAt >= PAID_DISPLAY_MS) {
                        await fetch(API_BASE + '/signage/ack-paid?store_id=' + storeId, { method: 'POST' });
                        paidShownAt = null;
                        hidePaidMode();
                        showIdleMode();
                    }
                    return;
                }
                if (data.status === 'waiting_payment' && (data.qr_plain_text || data.qr_image)) {
                    paidShownAt = null;
                    hidePaidMode();
                    showQRMode(data.qr_image, data.amount, data.order_items, data.qr_plain_text);
                    return;
                }
                if (data.status === 'cart' && data.order_items && data.order_items.length > 0) {
                    paidShownAt = null;
                    hidePaidMode();
                    showCartOnlyMode(data.order_items, data.amount);
                    return;
                }
                if (data.status === 'waiting_payment' && !data.qr_plain_text && !data.qr_image) {
                    console.warn('Signage: waiting_payment but no qr_plain_text/qr_image', data);
                }
                paidShownAt = null;
                hidePaidMode();
                showIdleMode();
            } catch (e) { console.warn('Signage poll', e); }
        }

        function startPolling() {
            if (pollInterval) return;
            loadSignageMedia();
            poll();
            pollInterval = setInterval(poll, 1000);
        }

        (function tryFullscreen() {
            if (new URLSearchParams(window.location.search).get('fullscreen') !== '1') return;
            function goFullscreen() {
                var el = document.documentElement;
                try {
                    if (el.requestFullscreen) el.requestFullscreen().catch(function() {});
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                    else if (el.msRequestFullscreen) el.msRequestFullscreen();
                } catch (e) {}
            }
            function onUserGesture() {
                document.removeEventListener('click', onUserGesture);
                document.removeEventListener('touchstart', onUserGesture);
                goFullscreen();
            }
            document.addEventListener('click', onUserGesture, { once: true });
            document.addEventListener('touchstart', onUserGesture, { once: true });
        })();

        document.addEventListener('DOMContentLoaded', startPolling);
    </script>
</body>
</html>
