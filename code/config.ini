; Stripe API – จาก docs/Stripe.note และ https://docs.stripe.com/api (REST, form-encoded request, JSON response)
; Base URL: https://api.stripe.com
[STRIPE]
STRIPE_API_URL=https://api.stripe.com
; API Key (Secret) – ใส่ค่าจริงใน environment (STRIPE_SECRET_KEY) หรือ config ท้องถิ่น ห้าม commit ค่าจริง
STRIPE_SECRET_KEY=
; Publishable Key สำหรับ frontend – ใส่ค่าจริงใน environment (STRIPE_PUBLISHABLE_KEY) หรือ config ท้องถิ่น
STRIPE_PUBLISHABLE_KEY=
; Webhook signing secret (whsec_...) – ได้จาก Stripe หลัง Add endpoint
; ใช้ ngrok: รัน ngrok http 8000 แล้วเพิ่ม endpoint URL https://xxx.ngrok-free.app/api/payment-callback/webhook/stripe ใน dashboard.stripe.com/webhooks → Reveal signing secret แล้วใส่ด้านล่าง (ดู code/docs/STRIPE_NGROK.md)
; ค่า whsec_xxx ใส่หลัง Add endpoint ใน Stripe Dashboard (หรือใช้ stripe listen --forward-to localhost:8000/api/payment-callback/webhook/stripe)
STRIPE_WEBHOOK_SECRET=

; Apple Pay – ใช้ผ่าน Stripe (Payment Methods: apple_pay), เปิดใน Dashboard และใช้ Stripe keys ข้างบน
; เอกสาร: https://docs.stripe.com/payments/apple-pay
[APPLE_PAY]
APPLE_PAY_ENABLED=True
; ใช้ Stripe credentials จาก [STRIPE]; ถ้าเปิด Apple Pay ใน Stripe Dashboard จะรองรับเมื่อใช้ Stripe เป็น gateway

; ตั้งค่า Store POS – เครื่องพิมพ์ Thermal, เครื่องอ่าน QR, EDC รูดบัตร
; ค่าที่บันทึกจากหน้า Web Setting จะ override ที่นี่ (เก็บใน pos_settings.json)
[POS]
; ไดรเวอร์/ประเภทเครื่องพิมพ์ Thermal (เช่น ESC/POS, Star, Epson)
THERMAL_PRINTER_DRIVER=ESC/POS
; ชื่อเครื่องพิมพ์ (ตามที่แสดงใน Windows: การตั้งค่า > อุปกรณ์ > เครื่องพิมพ์)
THERMAL_PRINTER_NAME=XP-58
; พอร์ต (COM1, LPT1, USB001 หรือ IP:port สำหรับ network printer)
THERMAL_PRINTER_PORT=USB26
; อุปกรณ์อ่าน QR Code (COM port หรือ device id ถ้าใช้ serial)
QR_READER_PORT=
; เครื่อง EDC รูดบัตร (COM port หรือ IP:port ตามที่ผู้ผลิตกำหนด)
EDC_READER_PORT=
; ความกว้างกระดาษ Thermal มม. (58 หรือ 80)
THERMAL_PAPER_WIDTH_MM=80
; วิธีการชำระเงินที่แสดงบน Store POS (true=แสดงปุ่ม)
PAYMENT_PROMPTPAY_ENABLED=True
PAYMENT_CREDIT_DEBIT_ENABLED=True
PAYMENT_CASH_ENABLED=True

[NOTIFICATION]
LINE_OA_CHANNEL_ACCESS_TOKEN=
LINE_OA_CHANNEL_SECRET=
PUSH_NOTIFICATION_ENABLED=True

